name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # Change to 'master' if that's your default branch

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump service worker cache version
        run: |
          # Generate a version string from the current UTC timestamp e.g. v20260314-1523
          VERSION="v$(date -u +'%Y%m%d-%H%M')"
          echo "New cache version: $VERSION"

          # Replace the CACHE_VERSION line in service-worker.js
          sed -i "s/const CACHE_VERSION = '.*';/const CACHE_VERSION = '${VERSION}';/" service-worker.js

          echo "Updated service-worker.js:"
          grep "CACHE_VERSION" service-worker.js

      - name: Commit updated service worker
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add service-worker.js
          # Only commit if there's actually a change
          git diff --staged --quiet || git commit -m "chore: bump SW cache version [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        # This step only needed if you're using the Pages artifact method.
        # If you've set Pages to deploy from the branch directly (the simple way),
        # you can delete this step — the push above is enough.
