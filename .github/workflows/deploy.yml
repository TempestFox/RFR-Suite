name: Bump Service Worker Cache Version

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'service-worker.js'  # Prevent infinite loop from the bot's own commit

permissions:
  contents: write

jobs:
  bump-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump service worker cache version
        run: |
          VERSION="v$(date -u +'%Y%m%d-%H%M')"
          echo "New cache version: $VERSION"
          sed -i "s/const CACHE_VERSION = '.*';/const CACHE_VERSION = '${VERSION}';/" service-worker.js
          grep "CACHE_VERSION" service-worker.js

      - name: Commit updated service worker
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add service-worker.js
          git diff --staged --quiet || git commit -m "chore: bump SW cache version [skip ci]"
          git push
